<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HDI Prediction Result</title>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/>
</head>
<body>

<nav class="navbar navbar-dark navbar-expand-lg mb-4" style="background:#1a237e;">
  <div class="container">
    <a class="navbar-brand fw-bold" href="/">🌍 HDI Predictor</a>
    <div class="ms-auto">
      <a href="/plots" class="btn btn-outline-light btn-sm">📊 View EDA Plots</a>
    </div>
  </div>
</nav>

<div class="container">
  <div class="row justify-content-center">
    <div class="col-lg-7 text-center">

      <!-- Result card -->
      <div class="card shadow border-0 mb-4">
        <div class="card-body py-5">
          <h2 class="mb-1 fw-bold text-primary">Predicted HDI</h2>
          <div class="display-2 fw-bold my-3" style="color:#1a237e;">
            {{ prediction }}
          </div>
          <span class="badge fs-5 bg-{{ band_class }} px-4 py-2 rounded-pill">
            {{ band_label }} Human Development
          </span>

          <!-- Visual gauge bar -->
          <div class="mt-4 px-3">
            <div class="progress" style="height:22px; border-radius:12px;">
              <div
                class="progress-bar bg-{{ band_class }}"
                role="progressbar"
                style="width: {{ (prediction * 100)|round|int }}%;"
                aria-valuenow="{{ (prediction * 100)|round|int }}"
                aria-valuemin="0" aria-valuemax="100">
                {{ prediction }}
              </div>
            </div>
            <div class="d-flex justify-content-between small text-muted mt-1">
              <span>0.0 (Low)</span><span>0.55 (Medium)</span>
              <span>0.7 (High)</span><span>1.0</span>
            </div>
          </div>
        </div>
      </div>

      <!-- Input summary -->
      <div class="card border-0 shadow-sm mb-4">
        <div class="card-header fw-semibold text-white" style="background:#283593;">
          Input Values Used
        </div>
        <div class="card-body">
          <table class="table table-sm table-hover mb-0">
            <thead class="table-light">
              <tr><th>Feature</th><th>Value</th></tr>
            </thead>
            <tbody>
              {% for feat, val in values.items() %}
              <tr>
                <td>{{ feat.replace('_', ' ') }}</td>
                <td>{{ val }}</td>
              </tr>
              {% endfor %}
            </tbody>
          </table>
        </div>
      </div>

      <a href="/" class="btn btn-primary px-5 py-2 fw-semibold mb-5">
        ← Predict Again
      </a>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
