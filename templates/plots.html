<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EDA Plots — HDI</title>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
</head>
<body>

<nav class="navbar navbar-dark mb-4" style="background:#1a237e;">
  <div class="container">
    <a class="navbar-brand fw-bold" href="/">🌍 HDI Predictor</a>
    <a href="/" class="btn btn-outline-light btn-sm ms-auto">← Back to Predictor</a>
  </div>
</nav>

<div class="container mb-5">
  <h3 class="fw-bold mb-4">📊 Exploratory Data Analysis Plots</h3>

  {% if plot_files %}
  <div class="row g-4">
    {% for plot in plot_files %}
    <div class="col-md-6">
      <div class="card border-0 shadow-sm">
        <div class="card-header text-capitalize fw-semibold" style="background:#e8eaf6;">
          {{ plot.replace('_', ' ').replace('.png','') }}
        </div>
        <div class="card-body p-2">
          <img src="{{ url_for('static', filename='plots/' ~ plot) }}"
               class="img-fluid rounded" alt="{{ plot }}"/>
        </div>
      </div>
    </div>
    {% endfor %}
  </div>
  {% else %}
  <div class="alert alert-warning">
    No plots found. Run <code>src/train.py</code> first to generate visualizations.
  </div>
  {% endif %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
