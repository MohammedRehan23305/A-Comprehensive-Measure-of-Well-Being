<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>HDI Result</title>
<style>
    * { box-sizing: border-box; }
    body {
        margin: 0;
        min-height: 100vh;
        font-family: 'Segoe UI', Arial, sans-serif;
        color: #fff;
        background: linear-gradient(180deg, #0b1f33 0%, #0a1828 45%, #060d16 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        position: relative;
        overflow: hidden;
    }
    .panel {
        background: #000;
        padding: 45px 70px;
        border-radius: 4px;
        max-width: 620px;
        position: relative;
        z-index: 2;
    }
    .panel h1 {
        color: #ff0000;
        font-size: 1.9em;
        margin: 0 0 14px;
    }
    .panel .subtitle {
        color: #c9a200;
        font-style: italic;
        font-weight: bold;
        font-size: 0.85em;
        margin-bottom: 35px;
    }
    .panel .result {
        color: #9aa800;
        font-weight: bold;
        font-size: 1.2em;
        margin-bottom: 10px;
    }
    a.button {
        display: inline-block;
        margin-top: 30px;
        padding: 10px 26px;
        background: #f0a500;
        color: #1e3c72;
        font-weight: bold;
        text-decoration: none;
        border-radius: 8px;
        position: relative;
        z-index: 2;
    }
    a.button:hover { background: #ffc233; }
    .footer-link { margin-top: 20px; position: relative; z-index: 2; }
</style>
</head>
<body>
    <div class="panel">
        <h1>Human Development Index</h1>
        <div class="subtitle">A machine learning web application using flask</div>
        <div class="result">{{ showcase }}</div>
    </div>
    <br>
    <div class="footer-link" style="position:absolute; bottom:40px;">
        <a class="button" href="/Prediction">Predict Again</a>
    </div>
</body>
</html>
