<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>HDI Prediction System</title>
<style>
    body {
        font-family: 'Segoe UI', Arial, sans-serif;
        background: linear-gradient(135deg, #1e3c72, #2a5298);
        color: #fff;
        margin: 0;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
    }
    .card {
        background: rgba(255,255,255,0.08);
        padding: 50px 60px;
        border-radius: 16px;
        box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        max-width: 600px;
    }
    h1 { font-size: 2.2em; margin-bottom: 10px; }
    p { font-size: 1.1em; line-height: 1.6; color: #e0e6f0; }
    a.button {
        display: inline-block;
        margin-top: 25px;
        padding: 14px 32px;
        background: #f0a500;
        color: #1e3c72;
        font-weight: bold;
        text-decoration: none;
        border-radius: 8px;
        transition: 0.2s;
    }
    a.button:hover { background: #ffc233; }
</style>
</head>
<body>
    <div class="card">
        <h1>Human Development Index Prediction</h1>
        <p>
            The Human Development Index (HDI) is a summary measure of average achievement
            in key dimensions of human development: a long and healthy life, access to knowledge,
            and a decent standard of living. Enter a country's statistics to predict its HDI category.
        </p>
        <form action="/Prediction" method="post">
            <button class="button" type="submit">Get Started</button>
        </form>
    </div>
</body>
</html>
